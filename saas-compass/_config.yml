title: SaaS Compass
description: Honest reviews and comparisons of the best SaaS tools — so you can work smarter, not harder.
baseurl: ""
url: "https://yourusername.github.io"
repository: yourusername/saas-compass

markdown: kramdown
permalink: /:categories/:title/
paginate: 10
paginate_path: "/page/:num/"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "SaaS Compass Team"

exclude:
  - scripts/
  - Gemfile
  - Gemfile.lock
  - README.md
  - .env
