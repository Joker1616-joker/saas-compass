<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-dot"></span>
        SaaS<span>Compass</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/categories/vpn' | relative_url }}">VPNs</a></li>
        <li><a href="{{ '/categories/hosting' | relative_url }}">Hosting</a></li>
        <li><a href="{{ '/categories/ai-tools' | relative_url }}">AI Tools</a></li>
        <li><a href="{{ '/categories/productivity' | relative_url }}">Productivity</a></li>
        <li><a href="{{ '/categories/seo' | relative_url }}">SEO</a></li>
        <li><a href="{{ '/about' | relative_url }}">About</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-inner">
      <div>
        <div class="logo" style="margin-bottom:0.5rem">SaaS<span style="color:var(--accent)">Compass</span></div>
        <div class="footer-note">© {{ 'now' | date: "%Y" }} SaaSCompass. Some links are affiliate links — we earn a commission at no extra cost to you.</div>
      </div>
      <div class="footer-links">
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/privacy' | relative_url }}">Privacy</a>
        <a href="{{ '/disclaimer' | relative_url }}">Disclaimer</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </div>
  </footer>
</body>
</html>
